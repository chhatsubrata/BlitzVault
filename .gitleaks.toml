# gitleaks config — extends the built-in ruleset, adds an allowlist for files
# that legitimately contain placeholder/example values.
# Docs: https://github.com/gitleaks/gitleaks

title = "BlitzVault gitleaks config"

# Pull in gitleaks' default rules, then layer our allowlist on top.
[extend]
useDefault = true

[allowlist]
description = "Allow example env files and lockfiles (placeholders, not secrets)"
paths = [
  '''\.env\.example$''',
  '''(^|/)pnpm-lock\.yaml$''',
  '''(^|/)package-lock\.json$''',
]
# Common placeholder tokens used in docs/CI so they don't trip the scanner.
regexes = [
  '''sk_test_ci_placeholder''',
  '''pk_test_ci_placeholder''',
  '''your-.*-key''',
  '''xxxx+''',
]
