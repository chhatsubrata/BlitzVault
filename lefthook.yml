# Lefthook git hooks — runs lint on changed files + a secret scan before every
# commit. Backend and frontend are separate pnpm projects; each lint command
# uses `root:` so lefthook scopes the glob to that folder, runs the command from
# there, and passes file paths relative to it (so eslint resolves correctly).
#
# Setup: from repo root run `pnpm install` (the prepare script wires the hook),
# or `pnpm run hooks:install`. gitleaks must be on PATH (see README).

pre-commit:
  parallel: true
  commands:
    backend-lint:
      root: "backend/"
      glob: "**/*.{ts,js}"
      run: pnpm exec eslint {staged_files}
      skip:
        - merge
        - rebase

    frontend-lint:
      root: "frontend/"
      glob: "**/*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files}
      skip:
        - merge
        - rebase

    secrets:
      # Scan only the staged diff; fail the commit if a secret is detected.
      # If gitleaks isn't installed locally, warn and continue — the CI
      # `secret-scan` job enforces over full history so nothing slips through.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "⚠ gitleaks not installed — skipping local secret scan (CI enforces). See README."
        fi
      skip:
        - merge
        - rebase

# Local "CI" gate before code leaves the machine — mirrors .github/workflows/ci.yml
# so a push that would go red on GitHub fails here first. This is a convenience
# gate, NOT a replacement for server-side CI: it only runs on machines with the
# hook installed and can be bypassed with `git push --no-verify`.
# Assumes deps are installed (`pnpm install` in each app). Backend tests run only
# when Postgres is reachable on localhost:5432; otherwise they're skipped.
pre-push:
  parallel: true
  commands:
    frontend-checks:
      root: "frontend/"
      run: pnpm run lint && pnpm run typecheck && pnpm run build

    backend-checks:
      root: "backend/"
      run: pnpm run lint && pnpm run typecheck && pnpm run build

    backend-tests:
      root: "backend/"
      run: |
        if { command -v pg_isready >/dev/null 2>&1 && pg_isready -q -h localhost -p 5432; } \
           || nc -z localhost 5432 >/dev/null 2>&1; then
          NODE_ENV=test pnpm run test
        else
          echo "⚠ Postgres not reachable on :5432 — skipping backend tests (CI enforces)."
        fi
