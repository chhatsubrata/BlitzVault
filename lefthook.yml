# Lefthook git hooks. ALL validation runs at COMMIT time (pre-commit); push is
# left fast on purpose so re-pushing doesn't re-run the suite. This mirrors
# .github/workflows/ci.yml so a commit that would go red on GitHub fails here
# first. Convenience gate, NOT a server-side CI replacement — only runs on
# machines with the hook installed and can be bypassed with `git commit --no-verify`.
#
# Setup: `pnpm install` (prepare script wires the hook) or `pnpm run hooks:install`.
# Assumes deps are installed in each app. Tests + migrations run only when
# Postgres is reachable on localhost:5432; otherwise they're skipped.

pre-commit:
  parallel: true
  commands:
    frontend-checks:
      root: "frontend/"
      run: pnpm run lint && pnpm run typecheck && pnpm run build
      skip:
        - merge
        - rebase

    backend-checks:
      root: "backend/"
      run: pnpm run lint && pnpm run typecheck && pnpm run build
      skip:
        - merge
        - rebase

    backend-tests:
      root: "backend/"
      run: |
        if { command -v pg_isready >/dev/null 2>&1 && pg_isready -q -h localhost -p 5432; } \
           || nc -z localhost 5432 >/dev/null 2>&1; then
          NODE_ENV=test pnpm run test
        else
          echo "⚠ Postgres not reachable on :5432 — skipping backend tests (CI enforces)."
        fi
      skip:
        - merge
        - rebase

    backend-migrations:
      # Mirrors CI `migration-dry-run`: apply pending migrations then list status
      # so the schema/tables are verified. migration:run is idempotent (no-op when
      # nothing is pending). Skipped when Postgres is down.
      root: "backend/"
      run: |
        if { command -v pg_isready >/dev/null 2>&1 && pg_isready -q -h localhost -p 5432; } \
           || nc -z localhost 5432 >/dev/null 2>&1; then
          pnpm run migration:run && pnpm run migration:show
        else
          echo "⚠ Postgres not reachable on :5432 — skipping migration check (CI enforces)."
        fi
      skip:
        - merge
        - rebase

    secrets:
      # Scan only the staged diff; fail the commit if a secret is detected.
      # If gitleaks isn't installed locally, warn and continue — the CI
      # `secret-scan` job enforces over full history so nothing slips through.
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --staged --redact --no-banner
        else
          echo "⚠ gitleaks not installed — skipping local secret scan (CI enforces). See README."
        fi
      skip:
        - merge
        - rebase
