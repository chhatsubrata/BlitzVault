services:
  postgres:
    image: postgres:16-alpine
    container_name: drive-clone-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drive_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drive_clone"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
