# BlitzVault local development — Postgres 16 + Redis + Mailpit (MailHog-compatible)
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Services: postgres (5432), redis (6379), mailhog (SMTP 1025 / UI 8025)
# See docs/sprint-week-1.md

name: blitzvault-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: blitzvault-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blitz_vault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blitz_vault"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blitzvault-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    # Mailpit = maintained drop-in for MailHog (unmaintained since 2019).
    # Same ports; ships a `readyz` subcommand usable as a healthcheck.
    image: axllent/mailpit:latest
    container_name: blitzvault-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI → http://localhost:8025
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Phase 2 stubs (commented; not started). Uncomment when OpenFGA + the
