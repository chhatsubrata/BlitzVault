# BlitzVault local development — Postgres 16
# Usage: docker compose -f docker-compose.dev.yml up -d
#
# Tuesday: redis, mailhog — see docs/sprint-week-1.md

name: blitzvault-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: blitzvault-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: drive_clone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d drive_clone"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
